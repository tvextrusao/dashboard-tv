<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Produção TV</title>
  <meta http-equiv="refresh" content="1800" />
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #151515;
      --panel-2: #1c1c1c;
      --border: #2b2b2b;
      --text: #ffffff;
      --muted: #a3a3a3;
      --good: #34d399;
      --bad: #f87171;
      --accent: #60a5fa;
      --radius: 28px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .slide {
      display: none;
      width: 100vw;
      height: 100vh;
      padding: 28px;
      background: var(--bg);
    }

    .slide.active { display: block; }

    .layout {
      width: 100%;
      height: 100%;
      display: grid;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .title {
      font-size: 44px;
      font-weight: 700;
      line-height: 1.1;
      margin: 0;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 22px;
      color: var(--muted);
    }

    .timestamp {
      color: var(--muted);
      font-size: 18px;
      white-space: nowrap;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .chart-box {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chart-canvas {
      width: 100%;
      height: 100%;
      min-height: 520px;
      border-radius: 18px;
      background: #0f0f0f;
    }

    .kpi-grid-3,
    .kpi-grid-4,
    .kpi-grid-2 {
      display: grid;
      gap: 18px;
    }

    .kpi-grid-3 { grid-template-rows: repeat(3, 1fr); }
    .kpi-grid-4 { grid-template-rows: repeat(4, 1fr); }
    .kpi-grid-2 { grid-template-columns: 1fr 1fr; }

    .kpi {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .kpi-label {
      font-size: 22px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .kpi-value {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
    }

    .kpi-value.medium { font-size: 54px; }

    .text-good { color: var(--good); }
    .text-bad { color: var(--bad); }

    .message {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}

.message .label {
  font-size: 20px;
  color: var(--muted);
  margin-bottom: 10px;
}

.message .value {
  font-size: 22px;
  line-height: 1.25;
  font-weight: 700;
  overflow-wrap: break-word;
}

    .footer-note {
      text-align: right;
      color: var(--muted);
      font-size: 18px;
    }

    .table-wrap {
      padding: 22px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
      table-layout: fixed;
    }

    thead th {
      color: var(--muted);
      font-size: 22px;
      text-align: left;
      padding: 0 16px;
    }

    tbody td {
      font-size: 28px;
      padding: 18px 16px;
      background: var(--panel-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr td:first-child {
      border-top-left-radius: 20px;
      border-bottom-left-radius: 20px;
      font-weight: 700;
    }

    tbody tr td:last-child {
      border-top-right-radius: 20px;
      border-bottom-right-radius: 20px;
      font-weight: 700;
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .slide-1 .layout { grid-template-rows: auto 1fr auto; }
    .slide-1 .content,
    .slide-2 .content,
    .slide-3 .content {
      display: grid;
      gap: 20px;
      min-height: 0;
    }

    .slide-1 .content,
    .slide-3 .content { grid-template-columns: 1.25fr 0.95fr; }
    .slide-2 .content { grid-template-columns: 1.35fr 0.95fr; }
    .slide-4 .layout,
    .slide-5 .layout,
    .slide-6 .layout { grid-template-rows: auto 1fr; }

    .slide-4 .content,
    .slide-5 .content,
    .slide-6 .content { min-height: 0; }

    .progress {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 6px;
      background: var(--accent);
      width: 0;
      animation: progressBar linear infinite;
      animation-duration: var(--rotation, 30s);
    }

    .loading,
    .error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 28px;
      background: var(--bg);
    }

    .error { color: #fca5a5; }

    @keyframes progressBar {
      from { width: 0; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app" class="loading">A carregar dashboard...</div>
  <div class="progress"></div>

  <script>
    const CONFIG = {
      spreadsheetId: '1oP7cxDdI-H56Pgh6nuYy8Vp7b32PCqzeJijNg27i1O8',
      rotationSeconds: 30,
      yearReferenceFallback: 2025,
      yearCurrentFallback: 2026
    };

    document.documentElement.style.setProperty('--rotation', `${CONFIG.rotationSeconds}s`);

    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(initDashboard);

    async function initDashboard() {
      try {
        const [kpisRaw, seriesRaw, resumoRaw] = await Promise.all([
          fetchSheet('kpis'),
          fetchSheet('series'),
          fetchSheet('resumo')
        ]);

        const dashboardData = normalizeData(kpisRaw, seriesRaw, resumoRaw);
        renderDashboard(dashboardData);
        startRotation(dashboardData.rotationSeconds || CONFIG.rotationSeconds, dashboardData);
        drawAllCharts(dashboardData);
        window.addEventListener('resize', () => drawAllCharts(dashboardData));
      } catch (error) {
        document.getElementById('app').className = 'error';
        document.getElementById('app').innerHTML = `Erro ao ler dados do Google Sheets.<br><br>${escapeHtml(error.message)}`;
      }
    }

    function sheetQueryUrl(sheetName) {
      return `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=out:json`;
    }

    async function fetchSheet(sheetName) {
      const response = await fetch(sheetQueryUrl(sheetName));
      if (!response.ok) throw new Error(`Falha ao ler o separador ${sheetName}`);
      const raw = await response.text();
      const json = JSON.parse(raw.substring(47).slice(0, -2));
      return json.table;
    }

    function gvizTableToObjects(table) {
      const headers = table.cols.map(col => String(col.label || col.id || '').trim());
      return table.rows
        .map(row => {
          const obj = {};
          headers.forEach((header, idx) => {
            const cell = row.c[idx];
            obj[header] = cell ? cell.v : '';
          });
          return obj;
        })
        .filter(row => Object.values(row).some(v => v !== '' && v !== null));
    }

    function toNumber(value) {
      if (typeof value === 'number') return value;
      if (value === null || value === undefined) return 0;

      const cleaned = String(value)
        .trim()
        .replace(/^'/, '')
        .replace(/\s/g, '')
        .replace('%', '')
        .replace(',', '.');

      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeData(kpisTable, seriesTable, resumoTable) {
      const kpisRows = gvizTableToObjects(kpisTable);
      const seriesRows = gvizTableToObjects(seriesTable);
      const resumoRows = gvizTableToObjects(resumoTable);

      const kpis = {};
      kpisRows.forEach(row => {
        const key = String(row.campo || row.Campo || '').trim();
        if (key) kpis[key] = row.valor ?? row.Valor ?? '';
      });

      const yearReference = String(kpis.yearReference || CONFIG.yearReferenceFallback);
      const yearCurrent = String(kpis.yearCurrent || CONFIG.yearCurrentFallback);

      return {
        rotationSeconds: toNumber(kpis.rotationSeconds || CONFIG.rotationSeconds),
        updatedAt: String(kpis.updatedAt || new Date().toLocaleString('pt-PT')),
        currentWeek: toNumber(kpis.currentWeek || 0),
        yearReference,
        yearCurrent,
        summary: {
          totalCurrent: formatInt(kpis.totalCurrent),
          diffAbsolute: formatSignedInt(kpis.diffAbsolute),
          diffPercent: formatSignedPercent(kpis.diffPercent)
        },
        weekly: {
          bestWeek: { week: String(kpis.bestWeek || ''), value: formatSignedPercent(kpis.bestValue) },
          worstWeek: { week: String(kpis.worstWeek || ''), value: formatSignedPercent(kpis.worstValue) },
          message: String(kpis.message || '')
        },
        efficiency: {
          days: formatInt(kpis.days),
          perDay: formatInt(kpis.perDay),
          perHour: formatInt(kpis.perHour),
          variation: formatSignedPercent(kpis.variation)
        },
        waste: {
          y2025: toNumber(kpis.waste2025),
          y2026: toNumber(kpis.waste2026),
          diffAbs: formatSignedInt(kpis.wasteDiffAbs),
          diffPct: formatSignedPercent(kpis.wasteDiffPct)
        },
          kgh: {
          y2025: toNumber(kpis.kgh2025),
          y2026: toNumber(kpis.kgh2026),
          diffAbs: formatSignedInt(kpis.kghDiffAbs),
          diffPct: formatSignedPercent(kpis.kghDiffPct)
        },
        seriesRows: seriesRows.map(row => ({
          semana: String(row.semana || row.Semana || ''),
          yRef: toNumber(row[yearReference]),
          yCur: toNumber(row[yearCurrent])
        })).filter(row => row.semana),
        tableRows: resumoRows.map(row => ({
          semana: String(row.semana || row.Semana || ''),
          ref: toNumber(row[yearReference]),
          cur: toNumber(row[yearCurrent]),
          difAbs: toNumber(row.dif_abs ?? row['Dif. Abs.'] ?? row.dif ?? 0),
          difPct: toNumber(row.dif_pct ?? row['Dif. %'] ?? row.pct ?? 0)
        })).filter(row => row.semana)
      };
    }

    function renderDashboard(data) {
      document.getElementById('app').className = '';
      document.getElementById('app').innerHTML = `
        <section class="slide slide-1 active">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Produção acumulada ${data.yearCurrent} vs ${data.yearReference}</h1>
                <div class="subtitle">Até à semana ${data.currentWeek}</div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content">
              <div class="panel chart-box"><div id="chart1" class="chart-canvas"></div></div>
              <div class="kpi-grid-3">
                <div class="kpi">
                  <div class="kpi-label">Total ${data.yearCurrent}</div>
                  <div class="kpi-value">${escapeHtml(data.summary.totalCurrent)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Desvio absoluto</div>
                  <div class="kpi-value ${data.summary.diffAbsolute.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.summary.diffAbsolute)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Desvio %</div>
                  <div class="kpi-value ${data.summary.diffPercent.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.summary.diffPercent)}</div>
                </div>
              </div>
            </div>
           </div>
        </section>

        <section class="slide slide-2">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Produção por semana</h1>
                <div class="subtitle">Comparação semanal ${data.yearCurrent} vs ${data.yearReference}</div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content">
              <div class="panel chart-box"><div id="chart2" class="chart-canvas"></div></div>
              <div class="panel" style="padding:20px; display:grid; grid-template-rows:auto 1fr; gap:16px; min-height:0;">
                <div class="kpi-grid-2">
                  <div class="kpi">
                    <div class="kpi-label">Melhor semana</div>
                    <div class="kpi-value medium">${escapeHtml(data.weekly.bestWeek.week)}</div>
                    <div class="kpi-label text-good" style="margin-top:12px; font-size:28px;">${escapeHtml(data.weekly.bestWeek.value)}</div>
                  </div>
                  <div class="kpi">
                    <div class="kpi-label">Pior semana</div>
                    <div class="kpi-value medium">${escapeHtml(data.weekly.worstWeek.week)}</div>
                    <div class="kpi-label text-bad" style="margin-top:12px; font-size:28px;">${escapeHtml(data.weekly.worstWeek.value)}</div>
                  </div>
                </div>
                <div class="message">
                  <div class="value">${escapeHtml(data.weekly.message)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="slide slide-3">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Eficiência operacional</h1>
                <div class="subtitle">Produção por dia e por hora</div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content">
              <div class="panel chart-box"><div id="chart3" class="chart-canvas"></div></div>
              <div class="kpi-grid-4">
                <div class="kpi">
                  <div class="kpi-label">Dias corridos</div>
                  <div class="kpi-value medium">${escapeHtml(data.efficiency.days)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Produção/dia</div>
                  <div class="kpi-value medium">${escapeHtml(data.efficiency.perDay)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Produção/hora</div>
                  <div class="kpi-value medium">${escapeHtml(data.efficiency.perHour)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Variação vs ${data.yearReference}</div>
                  <div class="kpi-value medium ${data.efficiency.variation.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.efficiency.variation)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>

                <section class="slide slide-4">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Desperdício</h1>
                <div class="subtitle">Comparação ${data.yearCurrent} vs ${data.yearReference}</div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content">
              <div class="panel chart-box"><div id="chart4" class="chart-canvas"></div></div>
              <div class="kpi-grid-3">
                <div class="kpi">
                  <div class="kpi-label">Desperdício ${data.yearCurrent}</div>
                  <div class="kpi-value">${escapeHtml(formatInt(data.waste.y2026))}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Variação absoluta</div>
                  <div class="kpi-value ${data.waste.diffAbs.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.waste.diffAbs)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Variação %</div>
                  <div class="kpi-value ${data.waste.diffPct.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.waste.diffPct)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>

                <section class="slide slide-5">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Kg/hora</h1>
                <div class="subtitle">Comparação ${data.yearCurrent} vs ${data.yearReference}</div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content">
              <div class="panel chart-box"><div id="chart5" class="chart-canvas"></div></div>
              <div class="kpi-grid-3">
                <div class="kpi">
                  <div class="kpi-label">Kg/hora ${data.yearCurrent}</div>
                  <div class="kpi-value">${escapeHtml(formatInt(data.kgh.y2026))}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Variação absoluta</div>
                  <div class="kpi-value ${data.kgh.diffAbs.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.kgh.diffAbs)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Variação %</div>
                  <div class="kpi-value ${data.kgh.diffPct.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.kgh.diffPct)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="slide slide-6">
          <div class="layout">
            <div class="header">
              <div>
                <h1 class="title">Resumo semanal</h1>
                <div class="subtitle"></div>
              </div>
              <div class="timestamp">Atualizado em<br>${escapeHtml(data.updatedAt)}</div>
            </div>
            <div class="content panel table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Semana</th>
                    <th>${data.yearReference}</th>
                    <th>${data.yearCurrent}</th>
                    <th>Dif.</th>
                    <th>%</th>
                  </tr>
                </thead>
                <tbody id="summary-table-body"></tbody>
              </table>
              <div class="totals">
                <div class="kpi">
                  <div class="kpi-label">TOTAL ${data.yearCurrent}</div>
                  <div class="kpi-value medium">${escapeHtml(data.summary.totalCurrent)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Dif. total</div>
                  <div class="kpi-value medium ${data.summary.diffAbsolute.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.summary.diffAbsolute)}</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Dif. %</div>
                  <div class="kpi-value medium ${data.summary.diffPercent.startsWith('+') ? 'text-good' : 'text-bad'}">${escapeHtml(data.summary.diffPercent)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>`;

      document.getElementById('summary-table-body').innerHTML = data.tableRows.map(row => `
        <tr>
          <td>${escapeHtml(row.semana)}</td>
          <td>${escapeHtml(formatInt(row.ref))}</td>
          <td>${escapeHtml(formatInt(row.cur))}</td>
          <td>${escapeHtml(formatSignedInt(row.difAbs))}</td>
          <td class="${row.difPct >= 0 ? 'text-good' : 'text-bad'}">${escapeHtml(formatSignedPercent(row.difPct))}</td>
        </tr>`).join('');
    }

    function drawAllCharts(data) {
  drawChart1(data);
  drawChart2(data);
  drawChart3(data);
  drawChart4(data);
  drawChart5(data);
}

    function drawChart1(data) {
      const table = new google.visualization.DataTable();
      table.addColumn('string', 'Semana');
      table.addColumn('number', String(data.yearReference));
      table.addColumn('number', String(data.yearCurrent));
      data.seriesRows.forEach(row => table.addRow([row.semana, row.yRef, row.yCur]));

      const chart = new google.visualization.ColumnChart(document.getElementById('chart1'));
      chart.draw(table, {
        backgroundColor: '#0f0f0f',
        chartArea: { left: 90, top: 45, width: '82%', height: '72%' },
        legend: { position: 'top', textStyle: { color: '#ffffff', fontSize: 18 } },
        hAxis: {
          title: 'Semana',
          titleTextStyle: { color: '#ffffff', fontSize: 18 },
          textStyle: { color: '#ffffff', fontSize: 18 },
          baselineColor: '#555'
        },
        vAxis: {
          title: 'Produção (kg)',
          titleTextStyle: { color: '#ffffff', fontSize: 18 },
          textStyle: { color: '#ffffff', fontSize: 16 },
          gridlines: { color: '#333' },
          baselineColor: '#555'
        },
        colors: ['#60a5fa', '#34d399']
      });
    }

    function drawChart2(data) {
      const table = new google.visualization.DataTable();
      table.addColumn('string', 'Semana');
      table.addColumn('number', 'Diferença (%)');
      data.tableRows.forEach(row => table.addRow([row.semana, row.difPct]));

      const chart = new google.visualization.ColumnChart(document.getElementById('chart2'));
      chart.draw(table, {
        backgroundColor: '#0f0f0f',
        chartArea: { left: 90, top: 50, width: '84%', height: '70%' },
        legend: { position: 'top', textStyle: { color: '#ffffff', fontSize: 18 } },
        hAxis: {
          title: 'Semana',
          titleTextStyle: { color: '#ffffff', fontSize: 18 },
          textStyle: { color: '#ffffff', fontSize: 20 },
          baselineColor: '#555'
        },
        vAxis: {
          title: 'Diferença (%)',
          titleTextStyle: { color: '#ffffff', fontSize: 18 },
          textStyle: { color: '#ffffff', fontSize: 18 },
          gridlines: { color: '#333' },
          baselineColor: '#555',
          format: "#'%'"
        },
        colors: ['#f59e0b']
      });
    }

    function drawChart3(data) {
      const table = google.visualization.arrayToDataTable([
        ['Indicador', 'Valor'],
        ['Produção/dia (kg)', toNumber(data.efficiency.perDay)],
        ['Produção/hora (kg/h)', toNumber(data.efficiency.perHour)]
      ]);

      const chart = new google.visualization.BarChart(document.getElementById('chart3'));
      chart.draw(table, {
        backgroundColor: '#0f0f0f',
        chartArea: { left: 220, top: 55, width: '72%', height: '50%' },
        legend: 'none',
        hAxis: {
          title: 'Quantidade',
          titleTextStyle: { color: '#ffffff', fontSize: 18 },
          textStyle: { color: '#ffffff', fontSize: 20 },
          gridlines: { color: '#333' },
          baselineColor: '#555'
        },
        vAxis: {
          textStyle: { color: '#ffffff', fontSize: 24 }
        },
        colors: ['#a78bfa']
      });
    }

    function startRotation(rotationSeconds, data) {
      const slides = document.querySelectorAll('.slide');
      let current = 0;

      setInterval(() => {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');

        setTimeout(() => {
          drawAllCharts(data);
        }, 150);

      }, rotationSeconds * 1000);
    }

    function formatInt(value) {
      const n = toNumber(value);
      return new Intl.NumberFormat('pt-PT', { maximumFractionDigits: 0 }).format(n);
    }

    function formatSignedInt(value) {
      const n = toNumber(value);
      const formatted = formatInt(Math.abs(n));
      return `${n >= 0 ? '+' : '-'}${formatted}`;
    }

    function formatSignedPercent(value) {
      const n = toNumber(value);
      const formatted = new Intl.NumberFormat('pt-PT', { minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(Math.abs(n));
      return `${n >= 0 ? '+' : '-'}${formatted}%`;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
