<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Produção TV</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #151515;
      --panel-2: #1c1c1c;
      --border: #2b2b2b;
      --text: #ffffff;
      --muted: #a3a3a3;
      --good: #34d399;
      --bad: #f87171;
      --accent: #60a5fa;
      --radius: 22px;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { position: relative; }

    .slide {
      display: none;
      width: 100vw;
      height: 100vh;
      padding: 14px;
      background: var(--bg);
    }

    .slide.active { display: block; }

    .layout {
      width: 100%;
      height: 100%;
      display: grid;
      gap: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.08;
      margin: 0;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 17px;
      color: var(--muted);
    }

    .timestamp {
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
      text-align: right;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .chart-box {
      padding: 12px;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      background: #0f0f0f;
    }

    .chart-canvas {
      width: 100%;
      height: 100%;
      min-height: 300px;
      border-radius: 14px;
      background: #0f0f0f !important;
      display: block;
    }

    .kpi-grid-3,
    .kpi-grid-4,
    .kpi-grid-2 {
      display: grid;
      gap: 12px;
    }

    .kpi-grid-3 { grid-template-rows: repeat(3, 1fr); }
    .kpi-grid-4 { grid-template-rows: repeat(4, 1fr); }
    .kpi-grid-2 { grid-template-columns: 1fr 1fr; }

    .kpi {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .kpi-label {
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 44px;
      font-weight: 700;
      line-height: 1;
    }

    .kpi-value.medium { font-size: 36px; }

    .text-good { color: var(--good); }
    .text-bad  { color: var(--bad); }

    .message {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .message .value {
      font-size: 18px;
      line-height: 1.22;
      font-weight: 700;
      overflow-wrap: break-word;
    }

    .footer-note {
      text-align: right;
      color: var(--muted);
      font-size: 15px;
    }

    .table-wrap {
      padding: 14px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      table-layout: fixed;
    }

    thead th {
      color: var(--muted);
      font-size: 17px;
      text-align: left;
      padding: 0 10px;
    }

    tbody td {
      font-size: 19px;
      padding: 12px 10px;
      background: var(--panel-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr td:first-child {
      border-top-left-radius: 14px;
      border-bottom-left-radius: 14px;
      font-weight: 700;
    }

    tbody tr td:last-child {
      border-top-right-radius: 14px;
      border-bottom-right-radius: 14px;
      font-weight: 700;
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .slide-1 .layout { grid-template-rows: auto 1fr auto; }

    .slide-1 .content,
    .slide-2 .content,
    .slide-3 .content,
    .slide-4 .content,
    .slide-5 .content {
      display: grid;
      gap: 12px;
      min-height: 0;
    }

    .slide-1 .content,
    .slide-3 .content,
    .slide-4 .content,
    .slide-5 .content {
      grid-template-columns: 1.2fr 0.9fr;
    }

    .slide-2 .content { grid-template-columns: 1.3fr 0.9fr; }

    .slide-6 .layout { grid-template-rows: auto 1fr; }
    .slide-6 .content { min-height: 0; }

    .progress {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 5px;
      background: var(--accent);
      width: 0;
      animation: progressBar linear infinite;
      animation-duration: var(--rotation, 30s);
    }

    .loading,
    .error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 24px;
      background: var(--bg);
    }

    .error { color: #fca5a5; }

    @keyframes progressBar {
      from { width: 0; }
      to   { width: 100%; }
    }

    @media (max-width: 1366px), (max-height: 768px) {
      .slide { padding: 10px; }

      .layout,
      .slide-1 .content,
      .slide-2 .content,
      .slide-3 .content,
      .slide-4 .content,
      .slide-5 .content,
      .totals,
      .kpi-grid-2,
      .kpi-grid-3,
      .kpi-grid-4 { gap: 10px; }

      .title         { font-size: 28px; }
      .subtitle      { font-size: 15px; }
      .timestamp,
      .footer-note,
      .kpi-label,
      thead th       { font-size: 14px; }
      .kpi           { padding: 12px; }
      .kpi-value     { font-size: 36px; }
      .kpi-value.medium { font-size: 30px; }
      .chart-box     { padding: 10px; }
      .chart-canvas  { min-height: 250px; }
      tbody td       { font-size: 17px; padding: 10px 8px; }
      .message       { padding: 12px; }
      .message .value { font-size: 16px; line-height: 1.18; }
    }
  </style>
</head>
<body>
  <div id="app" class="loading">A carregar dashboard...</div>
  <div class="progress"></div>

  <script>
    /* ─── CONFIG ─────────────────────────────────────────────────────────── */
    const CONFIG = {
      spreadsheetId: '1oP7cxDdI-H56Pgh6nuYy8Vp7b32PCqzeJijNg27i1O8',
      rotationSeconds: 30,
      // Used only when the sheet doesn't provide these values
      yearReferenceFallback: 2025,
      yearCurrentFallback: 2026
    };

    document.documentElement.style.setProperty('--rotation', `${CONFIG.rotationSeconds}s`);

    /* ─── CHART REGISTRY ─────────────────────────────────────────────────── */
    // Single map instead of five numbered globals (chart1 … chart5)
    const charts = {};

    function drawChart(id, config) {
      if (charts[id]) charts[id].destroy();
      const ctx = document.getElementById(id).getContext('2d');
      charts[id] = new Chart(ctx, config);
    }

    /* ─── SHARED CHART OPTIONS ───────────────────────────────────────────── */
    // Built once, re-used via shallow merge — avoids calling baseOptions() N times per draw
    const BASE_OPTIONS = {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { labels: { color: '#ffffff', font: { size: 16 } } },
        tooltip: { enabled: true }
      },
      scales: {
        x: { ticks: { color: '#ffffff', font: { size: 16 } }, grid: { color: '#333' } },
        y: { ticks: { color: '#ffffff', font: { size: 14 } }, grid: { color: '#333' } }
      }
    };

    /**
     * Returns a chart options object merged from BASE_OPTIONS.
     * @param {{ xTitle?: string, yTitle?: string, yMin?: number, yMax?: number,
     *           yStepSize?: number, yTickCallback?: Function,
     *           isHorizontal?: boolean, hideLegend?: boolean }} overrides
     */
    function makeOptions(overrides = {}) {
      const xScale = {
        ticks: { color: '#ffffff', font: { size: overrides.isHorizontal ? 18 : 16 }, autoSkip: false },
        grid: { color: '#333' },
        ...(overrides.xTitle ? { title: { display: true, text: overrides.xTitle, color: '#ffffff', font: { size: 16 } } } : {})
      };

      const yScale = {
        ticks: {
          color: '#ffffff',
          font: { size: 14 },
          ...(overrides.yStepSize ? { stepSize: overrides.yStepSize } : {}),
          ...(overrides.yTickCallback ? { callback: overrides.yTickCallback } : {})
        },
        grid: { color: '#333' },
        ...(overrides.min !== undefined ? { min: overrides.min } : {}),
        ...(overrides.max !== undefined ? { max: overrides.max } : {}),
        ...(overrides.yTitle ? { title: { display: true, text: overrides.yTitle, color: '#ffffff', font: { size: 16 } } } : {})
      };

      return {
        ...BASE_OPTIONS,
        ...(overrides.isHorizontal ? { indexAxis: 'y' } : {}),
        plugins: {
          ...BASE_OPTIONS.plugins,
          legend: overrides.hideLegend
            ? { display: false }
            : BASE_OPTIONS.plugins.legend
        },
        scales: { x: xScale, y: yScale }
      };
    }

    /* ─── AXIS RANGE HELPER ──────────────────────────────────────────────── */
    /**
     * Computes a rounded min/max range from data values with padding.
     * Replaces hard-coded y-axis ranges in drawChart4 / drawChart5.
     * @param {number[]} values
     * @param {number}   paddingFactor  fraction of spread to add above/below
     * @param {number}   roundTo        round boundaries to nearest N
     */
    function niceAxisRange(values, paddingFactor = 0.15, roundTo = 1000) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const pad = (max - min) * paddingFactor || max * paddingFactor;
      return {
        min: Math.floor((min - pad) / roundTo) * roundTo,
        max: Math.ceil((max + pad)  / roundTo) * roundTo
      };
    }

    /* ─── DATA FETCHING ──────────────────────────────────────────────────── */
    function sheetQueryUrl(sheetName) {
      // Google Visualization query endpoint — returns JSONP-style wrapped JSON
      return `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=out:json`;
    }

    async function fetchSheet(sheetName) {
      const response = await fetch(sheetQueryUrl(sheetName));
      if (!response.ok) throw new Error(`Falha ao ler o separador ${sheetName}`);
      const raw = await response.text();
      // Strip the JSONP wrapper: google.visualization.Query.setResponse( … );
      const json = JSON.parse(raw.substring(47).slice(0, -2));
      return json.table;
    }

    /* ─── DATA NORMALISATION ─────────────────────────────────────────────── */
    function gvizTableToObjects(table) {
      const headers = table.cols.map(col => String(col.label || col.id || '').trim());
      return table.rows
        .map(row => {
          const obj = {};
          headers.forEach((header, idx) => {
            const cell = row.c[idx];
            obj[header] = cell ? cell.v : '';
          });
          return obj;
        })
        .filter(row => Object.values(row).some(v => v !== '' && v !== null));
    }

    function toNumber(value) {
      if (typeof value === 'number') return value;
      if (value === null || value === undefined) return 0;
      const cleaned = String(value)
        .trim()
        .replace(/^'/, '')
        .replace(/\s/g, '')
        .replace('%', '')
        .replace(',', '.');
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeData(kpisTable, seriesTable, resumoTable) {
      const kpisRows   = gvizTableToObjects(kpisTable);
      const seriesRows = gvizTableToObjects(seriesTable);
      const resumoRows = gvizTableToObjects(resumoTable);

      const kpis = {};
      kpisRows.forEach(row => {
        const key = String(row.campo || row.Campo || '').trim();
        if (key) kpis[key] = row.valor ?? row.Valor ?? '';
      });

      const yearReference = String(kpis.yearReference || CONFIG.yearReferenceFallback);
      const yearCurrent   = String(kpis.yearCurrent   || CONFIG.yearCurrentFallback);

      return {
        rotationSeconds: toNumber(kpis.rotationSeconds || CONFIG.rotationSeconds),
        updatedAt:   String(kpis.updatedAt || new Date().toLocaleString('pt-PT')),
        currentWeek: toNumber(kpis.currentWeek || 0),
        yearReference,
        yearCurrent,
        summary: {
          totalCurrent: formatInt(kpis.totalCurrent),
          diffAbsolute: formatSignedInt(kpis.diffAbsolute),
          diffPercent:  formatSignedPercent(kpis.diffPercent)
        },
        weekly: {
          bestWeek:  { week: String(kpis.bestWeek  || ''), value: formatSignedPercent(kpis.bestValue)  },
          worstWeek: { week: String(kpis.worstWeek || ''), value: formatSignedPercent(kpis.worstValue) },
          message: String(kpis.message || '')
        },
        efficiency: {
          days:      formatInt(kpis.days),
          perDay:    formatInt(kpis.perDay),
          perHour:   formatInt(kpis.perHour),
          variation: formatSignedPercent(kpis.variation)
        },
        waste: {
          y2025:   toNumber(kpis.waste2025),
          y2026:   toNumber(kpis.waste2026),
          diffAbs: formatSignedInt(kpis.wasteDiffAbs),
          diffPct: formatSignedPercent(kpis.wasteDiffPct)
        },
        kgh: {
          y2025:   toNumber(kpis.kgh2025),
          y2026:   toNumber(kpis.kgh2026),
          diffAbs: formatSignedInt(kpis.kghDiffAbs),
          diffPct: formatSignedPercent(kpis.kghDiffPct)
        },
        seriesRows: seriesRows.map(row => ({
          semana: String(row.semana || row.Semana || ''),
          yRef:   toNumber(row[yearReference]),
          yCur:   toNumber(row[yearCurrent])
        })).filter(row => row.semana),
        tableRows: resumoRows.map(row => ({
          semana: String(row.semana || row.Semana || ''),
          ref:    toNumber(row[yearReference]),
          cur:    toNumber(row[yearCurrent]),
          difAbs: toNumber(row.dif_abs  ?? row['Dif. Abs.'] ?? row.dif ?? 0),
          difPct: toNumber(row.dif_pct  ?? row['Dif. %']    ?? row.pct ?? 0)
        })).filter(row => row.semana)
      };
    }

    /* ─── SLIDE RENDERING ────────────────────────────────────────────────── */
    function slideHeader(title, subtitle, updatedAt) {
      return `
        <div class="header">
          <div>
            <h1 class="title">${title}</h1>
            ${subtitle ? `<div class="subtitle">${subtitle}</div>` : ''}
          </div>
          <div class="timestamp">Atualizado em<br>${escapeHtml(updatedAt)}</div>
        </div>`;
    }

    function kpiBlock(label, value, extraClass = '') {
      return `
        <div class="kpi">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value ${extraClass}">${escapeHtml(String(value))}</div>
        </div>`;
    }

    function signClass(str) {
      return String(str).startsWith('+') ? 'text-good' : 'text-bad';
    }

    function renderSlide1(data) {
      return `
        <section class="slide slide-1 active">
          <div class="layout">
            ${slideHeader(
              `Produção acumulada ${data.yearCurrent} vs ${data.yearReference}`,
              `Até à semana ${data.currentWeek}`,
              data.updatedAt
            )}
            <div class="content">
              <div class="panel chart-box"><canvas id="chart1" class="chart-canvas"></canvas></div>
              <div class="kpi-grid-3">
                ${kpiBlock(`Total ${data.yearCurrent}`, data.summary.totalCurrent)}
                ${kpiBlock('Desvio absoluto', data.summary.diffAbsolute, signClass(data.summary.diffAbsolute))}
                ${kpiBlock('Desvio %',        data.summary.diffPercent,  signClass(data.summary.diffPercent))}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderSlide2(data) {
      return `
        <section class="slide slide-2">
          <div class="layout">
            ${slideHeader(
              'Produção por semana',
              `Comparação semanal ${data.yearCurrent} vs ${data.yearReference}`,
              data.updatedAt
            )}
            <div class="content">
              <div class="panel chart-box"><canvas id="chart2" class="chart-canvas"></canvas></div>
              <div class="panel" style="padding:16px; display:grid; grid-template-rows:auto 1fr; gap:12px; min-height:0;">
                <div class="kpi-grid-2">
                  <div class="kpi">
                    <div class="kpi-label">Melhor semana</div>
                    <div class="kpi-value medium">${escapeHtml(data.weekly.bestWeek.week)}</div>
                    <div class="kpi-label text-good" style="margin-top:10px; font-size:24px;">${escapeHtml(data.weekly.bestWeek.value)}</div>
                  </div>
                  <div class="kpi">
                    <div class="kpi-label">Pior semana</div>
                    <div class="kpi-value medium">${escapeHtml(data.weekly.worstWeek.week)}</div>
                    <div class="kpi-label text-bad" style="margin-top:10px; font-size:24px;">${escapeHtml(data.weekly.worstWeek.value)}</div>
                  </div>
                </div>
                <div class="message">
                  <div class="value">${escapeHtml(data.weekly.message)}</div>
                </div>
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderSlide3(data) {
      return `
        <section class="slide slide-3">
          <div class="layout">
            ${slideHeader('Eficiência operacional', 'Produção por dia e por hora', data.updatedAt)}
            <div class="content">
              <div class="panel chart-box"><canvas id="chart3" class="chart-canvas"></canvas></div>
              <div class="kpi-grid-4">
                ${kpiBlock('Dias corridos',                     data.efficiency.days,      'medium')}
                ${kpiBlock('Produção/dia',                      data.efficiency.perDay,    'medium')}
                ${kpiBlock('Produção/hora',                     data.efficiency.perHour,   'medium')}
                ${kpiBlock(`Variação vs ${data.yearReference}`, data.efficiency.variation, 'medium ' + signClass(data.efficiency.variation))}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderSlide4(data) {
      return `
        <section class="slide slide-4">
          <div class="layout">
            ${slideHeader('Desperdício', `Comparação ${data.yearCurrent} vs ${data.yearReference}`, data.updatedAt)}
            <div class="content">
              <div class="panel chart-box"><canvas id="chart4" class="chart-canvas"></canvas></div>
              <div class="kpi-grid-3">
                ${kpiBlock(`Desperdício ${data.yearCurrent}`, formatInt(data.waste.y2026))}
                ${kpiBlock('Variação absoluta', data.waste.diffAbs, signClass(data.waste.diffAbs))}
                ${kpiBlock('Variação %',        data.waste.diffPct, signClass(data.waste.diffPct))}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderSlide5(data) {
      return `
        <section class="slide slide-5">
          <div class="layout">
            ${slideHeader('Kg/hora', `Comparação ${data.yearCurrent} vs ${data.yearReference}`, data.updatedAt)}
            <div class="content">
              <div class="panel chart-box"><canvas id="chart5" class="chart-canvas"></canvas></div>
              <div class="kpi-grid-3">
                ${kpiBlock(`Kg/hora ${data.yearCurrent}`, formatInt(data.kgh.y2026))}
                ${kpiBlock('Variação absoluta', data.kgh.diffAbs, signClass(data.kgh.diffAbs))}
                ${kpiBlock('Variação %',        data.kgh.diffPct, signClass(data.kgh.diffPct))}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderSlide6(data) {
      return `
        <section class="slide slide-6">
          <div class="layout">
            ${slideHeader('Resumo semanal', '', data.updatedAt)}
            <div class="content panel table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Semana</th>
                    <th>${data.yearReference}</th>
                    <th>${data.yearCurrent}</th>
                    <th>Dif.</th>
                    <th>%</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.tableRows.map(row => `
                    <tr>
                      <td>${escapeHtml(row.semana)}</td>
                      <td>${escapeHtml(formatInt(row.ref))}</td>
                      <td>${escapeHtml(formatInt(row.cur))}</td>
                      <td>${escapeHtml(formatSignedInt(row.difAbs))}</td>
                      <td class="${row.difPct >= 0 ? 'text-good' : 'text-bad'}">${escapeHtml(formatSignedPercent(row.difPct))}</td>
                    </tr>`).join('')}
                </tbody>
              </table>
              <div class="totals">
                ${kpiBlock(`TOTAL ${data.yearCurrent}`, data.summary.totalCurrent, 'medium')}
                ${kpiBlock('Dif. total', data.summary.diffAbsolute, 'medium ' + signClass(data.summary.diffAbsolute))}
                ${kpiBlock('Dif. %',     data.summary.diffPercent,  'medium ' + signClass(data.summary.diffPercent))}
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderDashboard(data) {
      document.getElementById('app').className = '';
      document.getElementById('app').innerHTML =
        renderSlide1(data) +
        renderSlide2(data) +
        renderSlide3(data) +
        renderSlide4(data) +
        renderSlide5(data) +
        renderSlide6(data);
    }

    /* ─── CHART DRAWING ──────────────────────────────────────────────────── */
    function drawChart1(data) {
      drawChart('chart1', {
        type: 'bar',
        data: {
          labels: data.seriesRows.map(r => r.semana),
          datasets: [
            { label: String(data.yearReference), data: data.seriesRows.map(r => r.yRef), backgroundColor: '#60a5fa' },
            { label: String(data.yearCurrent),   data: data.seriesRows.map(r => r.yCur), backgroundColor: '#34d399' }
          ]
        },
        options: makeOptions({ xTitle: 'Semana', yTitle: 'Produção (kg)' })
      });
    }

    function drawChart2(data) {
      drawChart('chart2', {
        type: 'bar',
        data: {
          labels: data.tableRows.map(r => r.semana),
          datasets: [{ label: 'Diferença (%)', data: data.tableRows.map(r => r.difPct), backgroundColor: '#f59e0b' }]
        },
        options: makeOptions({
          xTitle: 'Semana',
          yTitle: 'Diferença (%)',
          hideLegend: true,
          yTickCallback: v => `${v}%`
        })
      });
    }

    function drawChart3(data) {
      drawChart('chart3', {
        type: 'bar',
        data: {
          labels: ['Prod./dia (kg)', 'Prod./hora (kg/h)'],
          datasets: [{
            label: 'Valor',
            data: [toNumber(data.efficiency.perDay), toNumber(data.efficiency.perHour)],
            backgroundColor: '#a78bfa'
          }]
        },
        options: makeOptions({ isHorizontal: true, hideLegend: true, xTitle: 'Quantidade' })
      });
    }

    function drawChart4(data) {
      const range = niceAxisRange([data.waste.y2025, data.waste.y2026]);
      drawChart('chart4', {
        type: 'bar',
        data: {
          labels: [String(data.yearReference), String(data.yearCurrent)],
          datasets: [{ data: [data.waste.y2025, data.waste.y2026], backgroundColor: '#4f7ac8', barPercentage: 0.5, categoryPercentage: 0.6 }]
        },
        options: makeOptions({ hideLegend: true, yTitle: 'Desperdício (kg)', ...range })
      });
    }

    function drawChart5(data) {
      const range = niceAxisRange([data.kgh.y2025, data.kgh.y2026], 0.15, 10);
      drawChart('chart5', {
        type: 'bar',
        data: {
          labels: [String(data.yearReference), String(data.yearCurrent)],
          datasets: [{ data: [data.kgh.y2025, data.kgh.y2026], backgroundColor: '#4f7ac8', barPercentage: 0.5, categoryPercentage: 0.6 }]
        },
        options: makeOptions({ hideLegend: true, yTitle: 'Kg/hora', ...range })
      });
    }

    // Maps slide index (0-based) to its draw function; null = slide 6 (table, no chart)
    const SLIDE_DRAW_FNS = [drawChart1, drawChart2, drawChart3, drawChart4, drawChart5, null];

    function drawActiveChart(data) {
      const slides = [...document.querySelectorAll('.slide')];
      const idx = slides.findIndex(s => s.classList.contains('active'));
      const fn = SLIDE_DRAW_FNS[idx];
      if (fn) fn(data);
    }

    function drawAllCharts(data) {
      SLIDE_DRAW_FNS.forEach(fn => fn && fn(data));
    }

    /* ─── ROTATION ───────────────────────────────────────────────────────── */
    function startRotation(rotationSeconds, data) {
      const slides = document.querySelectorAll('.slide');
      let current = 0;

      setInterval(() => {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
        // Only redraw the chart that just became visible
        setTimeout(() => drawActiveChart(data), 120);
      }, rotationSeconds * 1000);
    }

    /* ─── UTILITIES ──────────────────────────────────────────────────────── */
    function debounce(fn, ms) {
      let timer;
      return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
    }

    function formatInt(value) {
      const n = toNumber(value);
      return new Intl.NumberFormat('pt-PT', { maximumFractionDigits: 0 }).format(n);
    }

    function formatSignedInt(value) {
      const n = toNumber(value);
      return `${n >= 0 ? '+' : '-'}${formatInt(Math.abs(n))}`;
    }

    function formatSignedPercent(value) {
      const n = toNumber(value);
      const formatted = new Intl.NumberFormat('pt-PT', {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      }).format(Math.abs(n));
      return `${n >= 0 ? '+' : '-'}${formatted}%`;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /* ─── ENTRY POINT ────────────────────────────────────────────────────── */
    async function initDashboard() {
      try {
        const [kpisRaw, seriesRaw, resumoRaw] = await Promise.all([
          fetchSheet('kpis'),
          fetchSheet('series'),
          fetchSheet('resumo')
        ]);

        const data = normalizeData(kpisRaw, seriesRaw, resumoRaw);

        renderDashboard(data);
        drawAllCharts(data);
        startRotation(data.rotationSeconds || CONFIG.rotationSeconds, data);

        // Debounced resize: only redraws the currently visible chart
        window.addEventListener('resize', debounce(() => drawActiveChart(data), 150));

      } catch (error) {
        document.getElementById('app').className = 'error';
        document.getElementById('app').innerHTML =
          `Erro ao ler dados do Google Sheets.<br><br>${escapeHtml(error.message)}`;
      }
    }

    initDashboard();
  </script>
</body>
</html>
